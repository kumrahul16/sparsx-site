<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0B0E13;
  color: #ffffff;
  font-family: 'Space Grotesk', sans-serif;
  overflow-x: hidden;
}

h1 {
  font-size: 3.8rem;
  font-weight: 600;
  letter-spacing: -1px;
}

.headline {
  font-size: 2.2rem;
  font-weight: 500;
  color: #4A9EFF;
}

button {
  background: #3A6FF7;
  color: white;
  border: none;
}

button:hover {
  background: #4A9EFF;
}
</style>
</head>

<body>

<canvas id="network"></canvas>

<div class="hero">
  <div>
    <h1>spars<span>X</span></h1>

    <div class="headline">
      Compute what matters. Nothing more.
    </div>

    <div class="subheadline">
      Modern AI and HPC workloads activate only what they need — sparsX is next-generation compute infrastructure designed for that reality.
    </div>

    <div class="email-form">
      <form action="#" method="POST">
        <input type="email" placeholder="Enter your email" required />
        <button type="submit">Stay Updated</button>
      </form>
    </div>

    <div class="build-note">
      We’re selectively constructing this site. The rest is unnecessary.
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById("network");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const nodes = [];
  const spacing = 120;

  for (let x = 0; x < canvas.width; x += spacing) {
    for (let y = 0; y < canvas.height; y += spacing) {
      if (Math.random() > 0.65) {
        nodes.push({ x, y });
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.07)";
    nodes.forEach(node => {
      ctx.beginPath();
      ctx.arc(node.x, node.y, 2, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  draw();
</script>

</body>
</html>
