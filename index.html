<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sparsX</title>

  <style>
    body {
      margin: 0;
      background: #0b0e13;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      z-index: 2;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 600;
      letter-spacing: -1px;
      margin-bottom: 25px;
    }

    h1 span {
      font-weight: 300;
    }

    .headline {
      font-size: 2.2rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .subheadline {
      font-size: 1.1rem;
      max-width: 750px;
      margin: 0 auto 40px auto;
      opacity: 0.8;
      line-height: 1.6;
    }

    .email-form {
      margin-top: 20px;
    }

    input[type="email"] {
      padding: 14px 18px;
      width: 280px;
      border-radius: 4px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: #1a1f27;
      color: white;
    }

    button {
      padding: 14px 20px;
      margin-left: 8px;
      border-radius: 4px;
      border: none;
      background: #ffffff;
      color: #0b0e13;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    .build-note {
      margin-top: 40px;
      font-size: 0.85rem;
      opacity: 0.5;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.8rem;
      }
      .headline {
        font-size: 1.6rem;
      }
      input[type="email"] {
        width: 220px;
      }
    }
  </style>
</head>

<body>

<canvas id="network"></canvas>

<div class="hero">
  <div>
    <h1>spars<span>X</span></h1>

    <div class="headline">
      Compute what matters. Nothing more.
    </div>

    <div class="subheadline">
      Modern AI and HPC workloads activate only what they need — sparsX is next-generation compute infrastructure designed for that reality.
    </div>

    <div class="email-form">
      <form action="#" method="POST">
        <input type="email" placeholder="Enter your email" required />
        <button type="submit">Stay Updated</button>
      </form>
    </div>

    <div class="build-note">
      We’re selectively constructing this site. The rest is unnecessary.
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById("network");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const nodes = [];
  const spacing = 120;

  for (let x = 0; x < canvas.width; x += spacing) {
    for (let y = 0; y < canvas.height; y += spacing) {
      if (Math.random() > 0.65) {
        nodes.push({ x, y });
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.07)";
    nodes.forEach(node => {
      ctx.beginPath();
      ctx.arc(node.x, node.y, 2, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  draw();
</script>

</body>
</html>
